<title>Family Pantry</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:sans-serif;background:#faf6f0;min-height:100vh;padding-bottom:40px;}
header{background:linear-gradient(135deg,#2d1f14,#4a3728);padding:16px 18px;position:sticky;top:0;z-index:99;}
header h1{color:#fff;font-size:20px;}header h1 b{color:#e8a870;font-style:italic;font-weight:400;}
header p{color:rgba(255,255,255,.5);font-size:11px;margin-top:2px;}
.sb{float:right;font-size:11px;color:rgba(255,255,255,.8);background:rgba(255,255,255,.12);padding:5px 11px;border-radius:99px;margin-top:-28px;}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#4ade80;margin-right:4px;}
.dot.off{background:#f87171;}
.mn{max-width:700px;margin:0 auto;padding:16px;}
#status{background:#e8f3ec;border:1px solid #b8d9c4;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#4a7c59;display:flex;gap:8px;align-items:center;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.sc{background:#fff;border-radius:14px;padding:13px;box-shadow:0 2px 10px rgba(45,31,20,.08);text-align:center;}
.sn{font-size:24px;font-weight:700;}.sn.r{color:#c0392b;}
.sl{font-size:10px;color:#6b5240;text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}
.af{background:#fff;border-radius:14px;padding:16px;margin-bottom:16px;box-shadow:0 2px 10px rgba(45,31,20,.08);}
.ft{font-size:16px;font-weight:700;color:#2d1f14;margin-bottom:12px;}
.fr{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;}
.fg{display:flex;flex-direction:column;flex:1;min-width:100px;}
.fg label{font-size:10px;font-weight:700;color:#6b5240;text-transform:uppercase;margin-bottom:4px;}

.ab{padding:10px 18px;border-radius:9px;border:none;background:#2d1f14;color:#fff;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;}
